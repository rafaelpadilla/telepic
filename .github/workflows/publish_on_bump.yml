name: Publish to PyPI

on:
  release:
    types:
      - published

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/telepic
    permissions:
      id-token: write
    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set package version from release tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          python3 <<'PY'
          import os
          import re
          import sys
          from pathlib import Path

          def version_from_release_tag(tag: str) -> str:
              """Accept v1.1.0, v.1.1.0, or 1.1.0 (also works with uppercase V)."""
              tag = tag.strip()
              if not tag:
                  raise ValueError("release tag is empty")
              if tag[0] in "vV":
                  tag = tag[1:]
              if tag.startswith("."):
                  tag = tag[1:]
              if not tag or not tag[0].isdigit():
                  raise ValueError(f"version must start with a digit, got {tag!r}")
              return tag

          release_tag = os.environ["RELEASE_TAG"]
          try:
              version = version_from_release_tag(release_tag)
          except ValueError as exc:
              sys.exit(f"Invalid release tag {release_tag!r}: {exc}")

          import subprocess

          subprocess.check_call(
              [sys.executable, "-m", "pip", "install", "-q", "packaging"],
              stdout=subprocess.DEVNULL,
          )
          from packaging.version import Version

          try:
              Version(version)
          except Exception as exc:
              sys.exit(f"Invalid PEP 440 version {version!r} from tag {release_tag!r}: {exc}")

          path = Path("pyproject.toml")
          text = path.read_text()
          new_text, count = re.subn(
              r'(?m)^version = "[^"]*"',
              f'version = "{version}"',
              text,
              count=1,
          )
          if count != 1:
              sys.exit("Expected exactly one version line in pyproject.toml")
          path.write_text(new_text)

          print(f"Release tag: {release_tag!r}")
          print(f"Publishing version: {version!r}")
          for line in new_text.splitlines():
              if line.startswith("version ="):
                  print(f"pyproject.toml: {line}")
                  break
          PY

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build distribution
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN2 }}
