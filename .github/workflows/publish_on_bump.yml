name: Publish to PyPI

on:
  release:
    types:
      - published

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/telepic
    permissions:
      id-token: write
    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set package version from release tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          # Strip optional leading "v" (v0.1.3 -> 0.1.3). Do not use sed here: GNU sed
          # treats "\0" in replacements like version = "0.1.3" as a backreference.
          VERSION="${RELEASE_TAG#v}"
          export VERSION
          echo "Publishing version: ${VERSION}"
          python3 -c "
          import os, re, sys
          from pathlib import Path

          version = os.environ['VERSION']
          path = Path('pyproject.toml')
          text = path.read_text()
          new_text, count = re.subn(
              r'(?m)^version = \"[^\"]*\"',
              f'version = \"{version}\"',
              text,
              count=1,
          )
          if count != 1:
              sys.exit('Expected exactly one version line in pyproject.toml')
          path.write_text(new_text)
          "

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build distribution
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN2 }}
